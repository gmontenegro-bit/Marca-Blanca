<div id="pg-login" class="page active">
      <div class="login-bg-grid"></div>
      <div class="login-bg-glow"></div>

      <div class="login-hero">
        <div class="login-hero-icon">
          <span class="mi">receipt_long</span>
        </div>
        <h1 id="login-hero-name" data-i18n="brand.defaultName">PayPoint</h1>
        <p data-i18n="layout.login.heroSub">Gestion de pagos de servicios para tu punto de caja</p>
      </div>

      <div class="login-sheet">
        <div class="login-sheet-handle"></div>
        <h2 data-i18n="layout.login.title">Iniciar sesion</h2>
        <p data-i18n="layout.login.sub">Accede con la cedula registrada por tu empresa</p>

        <div style="margin-bottom: 20px">
          <div
            style="
              font-size: 10px;
              font-weight: 800;
              text-transform: uppercase;
              letter-spacing: 0.7px;
              color: rgba(255, 255, 255, 0.5);
              margin-bottom: 8px;
              color: var(--on-sub);
            "
            data-i18n="layout.login.demoLabel"
          >Demo - ingresar como:</div>
          <div class="demo-pills">
            <div class="demo-pill" onclick="demoRole('superadmin',this)" data-i18n="roleLabels.superadmin">Super Admin</div>
            <div class="demo-pill sel" onclick="demoRole('admin',this)" data-i18n="roleLabels.admin">Administrador</div>
            <div class="demo-pill" onclick="demoRole('operador',this)" data-i18n="roleLabels.operador">Operador/a</div>
          </div>
        </div>

        <div class="field">
          <label class="f-label" data-i18n="layout.login.cedulaLabel">Cedula de identidad</label>
          <div class="f-wrap">
            <div class="f-ico"><span class="mi">badge</span></div>
            <input
              class="f-input"
              id="in-cedula"
              type="text"
              placeholder="000-000000-0000X"
              data-i18n-placeholder="layout.login.cedulaPlaceholder"
              inputmode="text"
            />
          </div>
        </div>
        <div class="field">
          <label class="f-label" data-i18n="layout.login.passwordLabel">Contrasena</label>
          <div class="f-wrap">
            <div class="f-ico"><span class="mi">lock_outline</span></div>
            <input class="f-input" id="in-pass" type="password" placeholder="........" data-i18n-placeholder="layout.login.passwordPlaceholder" />
          </div>
        </div>

        <button class="btn-login" onclick="doLogin()"><span class="mi">login</span> <span data-i18n="layout.login.enter">Entrar</span></button>

        <div style="font-size: 12px; color: var(--on-sub); text-align: center; margin-top: 20px" data-i18n="layout.login.forgot">
          Olvidaste tu contrasena? Contacta a tu Administrador
        </div>
      </div>
    </div>
