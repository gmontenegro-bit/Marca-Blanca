<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diseno-FE Prototype</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #0f766e;
        --border: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #eef2ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .container {
        max-width: 860px;
        margin: 40px auto;
        padding: 24px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
      }

      p {
        margin-top: 0;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 42px;
        padding: 0 14px;
        border-radius: 10px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-secondary {
        background: #fff;
        color: var(--text);
        border-color: var(--border);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Diseno + Front-End Prototype</h1>
        <p>Entrada rapida para abrir el prototipo implementado y navegar la arquitectura del proyecto.</p>

        <div class="actions">
          <a class="btn btn-primary" href="/src/html/pages/paypoint.html">Abrir prototipo PayPoint</a>
          <a class="btn btn-secondary" href="/src/html/pages/design-uikit.html">Abrir Design UIKit</a>
          <a class="btn btn-secondary" href="/src/">Ver carpeta src</a>
          <a class="btn btn-secondary" href="/design/">Ver carpeta design</a>
        </div>
      </section>
    </main>
  </body>
</html>
